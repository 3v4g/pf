<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raymond</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* CURSOR */
    * { cursor: none !important; }
    #cur-dot {
      position:fixed; z-index:9999; pointer-events:none;
      width:6px; height:6px; border-radius:50%;
      background:#fff;
      transform:translate(-50%,-50%);
    }

    html, body { width:100%; height:100%; overflow:hidden; }
    body {
      font-family:'Inter', sans-serif;
      background:#000; color:#fff;
      display:flex; align-items:center; justify-content:center;
    }

    /* STARS */
    #stars-canvas { position:fixed; inset:0; z-index:0; }

    /* VIGNETTE */
    .vignette {
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 100%);
    }

    /* CARD */
    .card {
      position:relative; z-index:2;
      display:flex; flex-direction:column;
      align-items:center; text-align:center;
    }

    /* WEAPON */
    .weapon-wrap {
      margin-bottom:-6px;
      animation: float 6s ease-in-out infinite;
      filter: drop-shadow(0 10px 30px rgba(255,255,255,0.07));
    }
    @keyframes float {
      0%,100% { transform:translateY(0) rotate(-5deg); }
      50%      { transform:translateY(-16px) rotate(-5deg); }
    }

    /* NAME */
    .name-wrap {
      display:flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono', monospace;
      font-weight:700; font-size:2.8rem;
      letter-spacing:-.02em; margin-bottom:8px;
    }
    .blink {
      display:inline-block; width:3px; height:2.4rem;
      background:#fff; border-radius:2px; margin-left:4px;
      vertical-align:middle;
      animation: blink .75s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* LOCATION */
    .location {
      display:flex; align-items:center; justify-content:center; gap:5px;
      font-size:.72rem; color:rgba(255,255,255,0.38);
      letter-spacing:.07em; margin-bottom:14px;
    }

    /* DESCRIPTION */
    .desc {
      max-width:320px;
      font-size:.8rem; line-height:1.7;
      color:rgba(255,255,255,0.38);
      margin-bottom:22px;
      letter-spacing:.01em;
    }

    /* ICONS */
    .icons-row {
      display:flex; align-items:center; gap:10px;
    }
    .icon-pill {
      width:46px; height:46px; border-radius:50%;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      display:flex; align-items:center; justify-content:center;
      transition:background .2s, transform .2s;
    }
    .icon-pill:hover { background:rgba(255,255,255,0.12); transform:translateY(-3px); }
    .icon-pill svg { width:20px; height:20px; }
    a.icon-pill { text-decoration:none; }

    /* DISCORD POPUP */
    .popup-overlay {
      position:fixed; inset:0; z-index:100;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.55); backdrop-filter:blur(6px);
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .popup-overlay.open { opacity:1; pointer-events:all; }
    .popup-box {
      background:#0e0e0e;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:18px; padding:28px 36px;
      display:flex; flex-direction:column; align-items:center; gap:14px;
      position:relative;
      transform:scale(.92); transition:transform .2s;
      box-shadow:0 30px 80px rgba(0,0,0,0.8);
    }
    .popup-overlay.open .popup-box { transform:scale(1); }
    .popup-close {
      position:absolute; top:12px; right:14px;
      background:none; border:none; color:rgba(255,255,255,0.35);
      font-size:1.1rem; transition:color .15s;
    }
    .popup-close:hover { color:#fff; }
    .popup-disc-icon svg { width:36px; height:36px; }
    .popup-label { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,0.3); }
    .popup-user { font-family:'JetBrains Mono',monospace; font-size:1.25rem; font-weight:700; color:#fff; }
    .copy-tag {
      margin-top:2px; padding:.45rem 1.2rem;
      background:rgba(88,101,242,0.15); border:1px solid rgba(88,101,242,0.35);
      border-radius:8px; color:#7983f5; font-size:.72rem;
      font-family:'Inter',sans-serif; letter-spacing:.05em;
      transition:background .2s, color .2s, border-color .2s;
    }
    .copy-tag:hover { background:#5865F2; color:#fff; border-color:#5865F2; }
    .copy-tag.ok { background:#22c55e; border-color:#22c55e; color:#fff; }

    /* PLAY BUTTON */
    .play-btn {
      margin-top: 18px;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s;
      cursor: pointer !important;
    }
    .play-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<div id="cur-dot"></div>
<canvas id="stars-canvas"></canvas>
<div class="vignette"></div>

<!-- AUDIO -->
<audio id="bgm" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<!-- Discord Popup -->
<div class="popup-overlay" id="disc-overlay">

      </svg>
    </div>
    <div class="popup-label">Discord</div>
    <div class="popup-user">@3v4g</div>

  </div>
</div>

<div class="card">

  <div class="weapon-wrap">
    <svg width="240" height="90" viewBox="0 0 240 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="208" y="34" width="26" height="12" rx="3" fill="rgba(255,255,255,0.3)"/>

      <rect x="74" y="25" width="48" height="7" rx="2" fill="rgba(255,255,255,0.28)"/>
      <rect x="85" y="16" width="34" height="12" rx="5" fill="rgba(255,255,255,0.4)"/>
      <circle cx="102" cy="22" r="3.5" fill="rgba(0,0,0,0.45)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <rect x="70" y="48" width="52" height="10" rx="2.5" fill="rgba(255,255,255,0.45)"/>
      <path d="M100 58 L94 78 Q92 83 96 83 L106 83 Q110 83 110 78 L104 58Z" fill="rgba(255,255,255,0.4)"/>
      <path d="M96 58 Q82 64 82 74 Q82 80 90 80 L94 80 L94 58Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <rect x="105" y="58" width="14" height="22" rx="3" fill="rgba(255,255,255,0.32)"/>
      <path d="M70 32 L36 31 Q24 31 24 40 Q24 49 36 49 L70 48Z" fill="rgba(255,255,255,0.42)"/>
      <rect x="24" y="38" width="12" height="5" rx="2" fill="rgba(255,255,255,0.22)"/>
      <rect x="120" y="33" width="6" height="4" rx="1" fill="rgba(255,255,255,0.2)"/>
      <rect x="196" y="31" width="3" height="8" rx="1" fill="rgba(255,255,255,0.35)"/>
    </svg>
  </div>

  <div class="name-wrap">

  <div class="location">

    </svg>
    Fort Lauderdale, Florida
  </div>

  <p class="desc">
    hey, i'm raymond. gamer, coder, just vibing.<br>
    based in florida, online everywhere else.
  </p>

  <div class="icons-row">
    <div class="icon-pill" id="disc-btn" title="Discord">

    <a class="icon-pill" href="https://github.com/3v4g" target="_blank" rel="noopener" title="GitHub">

    </a>
  </div>

  <!-- THIS BUTTON FIXES GITHUB PAGES AUDIO -->
  <button class="play-btn" id="play-btn">Play Music</button>

</div>

<script>
/* CURSOR */
const dot = document.getElementById('cur-dot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});

/* STARS */
const c = document.getElementById('stars-canvas'), ctx = c.getContext('2d');
let stars = [];
function initStars() {
  c.width = innerWidth; c.height = innerHeight; stars = [];
  for (let i = 0; i < 260; i++)
    stars.push({ x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.3+.2, o:Math.random()*.65+.1, t:Math.random()*Math.PI*2, s:Math.random()*.4+.04 });
}
initStars(); window.addEventListener('resize', initStars);

(function drawS() {
  ctx.clearRect(0,0,c.width,c.height);
  for (const s of stars) {
    s.t += s.s * .018;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.o*(0.5+0.5*Math.sin(s.t))})`;
    ctx.fill();
  }
  requestAnimationFrame(drawS);
})();

/* TYPEWRITER */
const nameEl = document.getElementById('typed-name');
const fullName = 'Raymond';
let idx = 0;
function type() {
  nameEl.textContent = fullName.slice(0, idx++);
  if (idx <= fullName.length) setTimeout(type, idx === 1 ? 500 : 95);
}
setTimeout(type, 700);

/* AUDIO FIX */
const bgm = document.getElementById('bgm');
bgm.volume = 0.5;

const playBtn = document.getElementById("play-btn");
playBtn.addEventListener("click", async () => {
  try {
    await bgm.play();
    playBtn.textContent = "Music Playing";
    playBtn.style.opacity = "0.4";
    playBtn.style.pointerEvents = "none";
  } catch (err) {
    alert("Browser blocked audio. Try clicking again.");
    console.log(err);
  }
});

/* DISCORD POPUP */
const overlay = document.getElementById('disc-overlay');
document.getElementById('disc-btn').addEventListener('click', () => overlay.classList.add('open'));
document.getElementById('disc-close').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

const copyBtn = document.getElementById('copy-disc');
copyBtn.addEventListener('click', () => {
  const text = '3v4g';
  const done = () => {
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('ok');
    setTimeout(() => { copyBtn.textContent = 'Copy Username'; copyBtn.classList.remove('ok'); }, 2000);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else { fallback(); }
  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  }
});
</script>
</body>
</html>
